services:
  app:
    build:
      target: final

    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload

    environment:
      DEBUG: "True"

    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

    ports:
      - "8000:8000"
      - "5678:5678"